[build]
  publish = "."
  command = "echo 'Frontend build completed - Static files ready'"

[build.environment]
  NODE_VERSION = "18"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[functions]
  directory = "netlify/functions"

[dev]
  command = "echo 'Dev server ready'"
  port = 3000
  publish = "."
  framework = "#static"
